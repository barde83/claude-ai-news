name: Scrape Claude AI News

on:
  schedule:
    # Runs every 2 days at 6:00 AM UTC
    - cron: '0 6 */2 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Trigger scraper and capture data
        run: |
          curl -s https://timely-llama-e0d105.netlify.app/.netlify/functions/scrape \
            | jq '{timestamp: .timestamp, count: .count, sources: .sources, news: .news}' \
            > public/news.json

          # Vérifie que le fichier a du contenu
          if [ ! -s public/news.json ]; then
            echo "❌ Erreur: news.json est vide"
            exit 1
          fi

          echo "✅ news.json créé avec $(jq '.count' public/news.json) items"

      - name: Commit and push if changed
        run: |
          git config user.name "Claude Bot"
          git config user.email "claude@anthropic.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update news" && git push)
