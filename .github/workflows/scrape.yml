name: Scrape Claude AI News

on:
  schedule:
    # Runs every 2 days at 6:00 AM UTC
    - cron: '0 6 */2 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Trigger scraper and capture data
        run: |
          echo "Fetching news from Netlify function..."
          curl -s --max-time 60 https://timely-llama-e0d105.netlify.app/.netlify/functions/scrape > /tmp/scrape_response.json 2>&1

          if [ ! -s /tmp/scrape_response.json ]; then
            echo "❌ Error: Empty response from scraper"
            cat /tmp/scrape_response.json || echo "(no output)"
            exit 1
          fi

          echo "Response received, parsing with jq..."
          jq '{timestamp: .timestamp, count: .count, sources: .sources, news: .news}' /tmp/scrape_response.json > public/news.json 2>&1 || {
            echo "❌ Error: Failed to parse JSON"
            echo "Raw response:"
            cat /tmp/scrape_response.json | head -50
            exit 1
          }

          if [ ! -s public/news.json ]; then
            echo "❌ Error: news.json is empty"
            exit 1
          fi

          ITEM_COUNT=$(jq '.count // 0' public/news.json)
          echo "✅ news.json created with $ITEM_COUNT items"

      - name: Commit and push if changed
        run: |
          git config user.name "Claude Bot"
          git config user.email "claude@anthropic.com"
          git add -A
          git status
          if ! git diff --quiet && git diff --staged --quiet; then
            echo "Changes detected, committing..."
            git commit -m "chore: update news" || (echo "Commit failed:" && git status && exit 1)
            echo "Push to origin..."
            git push origin main -v 2>&1 || (echo "Push failed:" && git status && exit 1)
            echo "✅ Push successful"
          else
            echo "No changes detected, skipping commit"
          fi
